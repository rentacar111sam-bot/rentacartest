<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#grad1)"/>
  <g transform="translate(300, 200)">
    <!-- Car body -->
    <ellipse cx="0" cy="20" rx="120" ry="60" fill="#475569" opacity="0.8"/>
    <rect x="-100" y="-20" width="200" height="60" rx="10" fill="#64748b"/>
    <!-- Windows -->
    <rect x="-80" y="-10" width="50" height="30" rx="5" fill="#94a3b8" opacity="0.6"/>
    <rect x="30" y="-10" width="50" height="30" rx="5" fill="#94a3b8" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="-70" cy="50" r="25" fill="#1e293b"/>
    <circle cx="-70" cy="50" r="20" fill="#475569"/>
    <circle cx="70" cy="50" r="25" fill="#1e293b"/>
    <circle cx="70" cy="50" r="20" fill="#475569"/>
    <!-- Headlights -->
    <circle cx="-95" cy="0" r="8" fill="#fbbf24" opacity="0.7"/>
    <circle cx="95" cy="0" r="8" fill="#fbbf24" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="300" y="360" font-size="24" fill="#94a3b8" text-anchor="middle" font-family="Arial">
    Avtomobil rasmi
  </text>
</svg>
